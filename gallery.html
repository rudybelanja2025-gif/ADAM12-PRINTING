<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - ADAM12 PRINTING</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>ADAM12 PRINTING</h1>
  <p>Percetakan, Advertising & Reklame</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="projects.html">Projects</a>
  <a href="gallery.html" class="active">Gallery</a>
</nav>

<section class="hero">
  <h2>Gallery Hasil Cetak</h2>
  <p>Contoh hasil pekerjaan kami</p>
</section>

<section class="gallery-container">
  <div id="gallery" class="gallery-grid"></div>
</section>

<footer>
  <p>© 2026 ADAM12 PRINTING</p>
</footer>

<script src="data.js"></script>
<script>
const gallery = document.getElementById("gallery");

if (gallery && typeof projects !== "undefined") {
  projects.forEach(p => {
    gallery.innerHTML += `
      <div class="gallery-card">
        <img src="${p.image}" alt="${p.title}">
        <h3>${p.title}</h3>
      </div>
    `;
  });
}
</script>

</body>
</html>
