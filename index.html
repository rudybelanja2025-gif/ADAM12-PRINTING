<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ADAM12 PRINTING</title>
<meta name="description" content="ADAM12 PRINTING: Percetakan, Advertising, dan Reklame profesional."/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
body{font-family:'DM Sans',sans-serif;margin:0;background:#F7F1E8}
header{padding:20px;background:#000;color:#fff;text-align:center}
nav{display:flex;justify-content:center;gap:15px;background:#222;padding:10px}
nav a{color:#fff;text-decoration:none}
.hero{padding:80px;text-align:center}
footer{text-align:center;padding:20px;background:#000;color:#fff}
</style>
</head>

<body>

<header>
<h1>ADAM12 PRINTING</h1>
<p>Percetakan, Advertising & Reklame</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
</nav>

<section class="hero">
<h2>Digital Printing Profesional</h2>
<p>Kami melayani banner, stiker, baliho dan kebutuhan promosi</p>
</section>

<section id="projects-preview"></section>
<section id="gallery-preview"></section>

<footer>
<p>© 2026 ADAM12 PRINTING</p>
</footer>

<script src="data.js"></script>
<script>
if(typeof projects!=="undefined"){
document.getElementById("projects-preview").innerHTML=projects.map(p=>`
<div>
<img src="${p.image}" width="150">
<p>${p.title}</p>
</div>`).join('');
}

if(typeof gallery!=="undefined"){
document.getElementById("gallery-preview").innerHTML=gallery.map(g=>`
<div>
<img src="${g.image}" width="150">
<p>${g.title}</p>
</div>`).join('');
}
</script>

</body>
</html>
